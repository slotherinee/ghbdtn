name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Generate app icon
        run: |
          swift ghbdtn/ghbdtn/make_icons.swift 2>/dev/null || true
          ICONSET="/tmp/ghbdtn.iconset"
          mkdir -p "$ICONSET"
          for f in 16 32 128 256 512; do
            cp /tmp/ghbdtn_iconset/icon_${f}x${f}.png    "$ICONSET/icon_${f}x${f}.png"
            cp /tmp/ghbdtn_iconset/icon_${f}x${f}@2x.png "$ICONSET/icon_${f}x${f}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o ghbdtn/ghbdtn/ghbdtn/AppIcon.icns

      - name: Build
        run: |
          xcodebuild \
            -project ghbdtn/ghbdtn.xcodeproj \
            -scheme ghbdtn \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Ad-hoc sign
        run: |
          APP="build/Build/Products/Release/ghbdtn.app"
          codesign --force --deep --sign - "$APP"

      - name: Create DMG
        run: |
          APP="build/Build/Products/Release/ghbdtn.app"
          VERSION="${{ github.ref_name }}"
          DMG="ghbdtn-${VERSION}.dmg"

          # Staging dir with app + Applications symlink
          STAGING="$(mktemp -d)/ghbdtn"
          mkdir "$STAGING"
          cp -r "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "ghbdtn ${VERSION}" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            "$DMG"

          echo "DMG_PATH=$DMG" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          name: "ghbdtn ${{ github.ref_name }}"
          body: |
            ## Установка / Installation

            1. Скачай `ghbdtn-${{ github.ref_name }}.dmg` / Download the `.dmg`
            2. Открой DMG, перетащи `ghbdtn.app` в папку **Applications** / Open DMG, drag `ghbdtn.app` to **Applications**
            3. При первом запуске macOS может заблокировать приложение — см. ниже / On first launch macOS may block the app — see below

            > **Если пишет «Не удалось открыть»:** Системные настройки → Конфиденциальность и безопасность → пролистай вниз → **«Всё равно открыть»**
            >
            > **If macOS says it can't be opened:** System Settings → Privacy & Security → scroll down → **"Open Anyway"**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
